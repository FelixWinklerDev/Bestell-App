<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestell-App</title>
  <link rel="shortcut icon" href="./assets/icons/Property 1=default.png" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="./styles/global.css">
  <link rel="stylesheet" href="./styles/fonts.css">
  <link rel="stylesheet" href="./styles/assets.css">
  <script src="./scripts/db.js"></script>
  <script src="script.js"></script>
  <script src="./scripts/templates.js"></script>
</head>
<body onload="init()">
  <header class="header-flex" id="top">
    <a href="index.html" class="header-logo"><img src="./assets/icons/Logo 01.png" alt="Logo"></a>
    <nav>
      <button id="burger-menu">
        <div class="burger-line"></div>
        <div class="burger-line"></div>
        <div class="burger-line"></div>
      </button>
    </nav>
  </header>
  <section class="hero-section">
    <img class="hero" src="./assets/img/hero.png" alt="Menü">
  </section>
  <section class="restaurant-details">
    <div class="positioning-logo">
      <img class="restaurant-logo" src="./assets/img/5045650232394c82bc6d0c922b2ea0aaace7e71d.png"
        alt="Restaurant-Logo">
    </div>
    <section>
      <div class="flex-title">
        <h1><span class="orange-inline">Burger</span>House</h1>
        <div class="evaluation">
          <img class="star" src="./assets/icons/star.png" alt="Stern">
          <p>4,3 (1337)</p>
        </div>
      </div>
      <p class="sub-title">Die besten Burger und Pizzen in deiner Umgebung!</p>
    </section>
  </section>
  <main id="content-wrapper">
    <section id="main-content">

    </section>
    <aside id="basket-content">
      <h3 id="basket-title">Dein Warenkorb</h3>
      <section id="basket-items">

      </section>
      <div class="seperator"></div>
      <section id="checkout-section">

      </section>
    </aside>
    <dialog id="checkout-dialog">
      <div>
        <div class="checkout-window">
          <button class="close" onclick="closeDialog()"><p class="x-close">X</p></button>
        </div>
        <div class="dialog-window">
          <img class="delivery-truck" src="./assets/icons/390482e1a64bffed0bc1416df77319027c50bba3.png" alt="Lieferwagen">
          <h4 class="dialog-subtitle">Deine Bestellung wurde erhalten.</h4>
          <p class="dialog-subtitle">Wir haben deine Bestellung erhalten und wird so schnell wie möglich bearbeiet.</p>
          <p class="dialog-subtitle">Geschätzte Wartezeit: <span class="waiting-time">30 Minuten</span></p>
        </div>
      </div>
    </dialog>
  </main>
  <section class="d-none">
    <button class="mobile-basket-btn" onclick="show-mobile-basket"><p class="button-txt">Zum Warenkorb</p></button>
  </section>
  <footer class="footer-positioning">
    <a class="footer-link" href="#top">©2025 BurgerHouse</a>
    <a class="footer-link" href="./impressum.html">Impressum & Datenschutz</a>
    <a class="footer-link" target="_blank" href="https://www.youtube.com/watch?v=YUnvdq9_TKI">Coockies</a>
  </footer>
</body>
</html>
